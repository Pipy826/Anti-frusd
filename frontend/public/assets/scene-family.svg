<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2d5e"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e5a"/>
      <stop offset="100%" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="face2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d4b3"/>
      <stop offset="100%" stop-color="#d4a882"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg2)" opacity="0.9"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="#2a4a8e" stroke-width="1.5" opacity="0.5"/>
  <!-- Hooded figure body -->
  <path d="M35 95 Q35 65 60 55 Q85 65 85 95" fill="url(#hoodie)"/>
  <!-- Hood -->
  <path d="M38 58 Q38 30 60 25 Q82 30 82 58 Q82 68 60 70 Q38 68 38 58" fill="url(#hoodie)"/>
  <!-- Face shadow inside hood -->
  <ellipse cx="60" cy="52" rx="15" ry="16" fill="#0d1520"/>
  <!-- Face -->
  <ellipse cx="60" cy="53" rx="12" ry="13" fill="url(#face2)"/>
  <!-- Eyes (shadowed/suspicious) -->
  <ellipse cx="54" cy="50" rx="3" ry="2.5" fill="#1a1a2e"/>
  <ellipse cx="66" cy="50" rx="3" ry="2.5" fill="#1a1a2e"/>
  <circle cx="55" cy="49.5" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="67" cy="49.5" r="1" fill="#fff" opacity="0.8"/>
  <!-- Mouth -->
  <path d="M55 58 Q60 61 65 58" fill="none" stroke="#8b5e3c" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Phone in hand -->
  <rect x="68" y="72" width="14" height="24" rx="3" fill="#1a2840" stroke="#4a6a9e" stroke-width="1"/>
  <rect x="70" y="75" width="10" height="16" rx="1" fill="#3b7dff" opacity="0.6"/>
  <!-- Signal waves from phone -->
  <path d="M86 78 Q90 76 90 80" fill="none" stroke="#4aff8b" stroke-width="1.2" opacity="0.7"/>
  <path d="M88 75 Q94 72 94 82" fill="none" stroke="#4aff8b" stroke-width="1" opacity="0.5"/>
  <!-- Warning icon -->
  <circle cx="90" cy="25" r="6" fill="#ff4444" opacity="0.85"/>
  <text x="87.5" y="29" font-size="10" fill="#fff" font-weight="bold">!</text>
</svg>
