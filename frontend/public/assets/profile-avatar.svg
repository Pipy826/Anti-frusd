<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="avbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a7a"/>
      <stop offset="100%" stop-color="#0d2050"/>
    </linearGradient>
    <linearGradient id="avring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9bff"/>
      <stop offset="100%" stop-color="#126cff"/>
    </linearGradient>
    <linearGradient id="avface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbe4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </linearGradient>
    <linearGradient id="avhair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="avshirt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a7bff"/>
      <stop offset="100%" stop-color="#1a4fd4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="url(#avbg)"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#avring)" stroke-width="3" opacity="0.8"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#2a5ab0" stroke-width="1" opacity="0.4"/>
  <!-- Body/Shirt -->
  <path d="M30 105 Q30 82 60 75 Q90 82 90 105" fill="url(#avshirt)"/>
  <!-- Neck -->
  <rect x="53" y="70" width="14" height="10" rx="4" fill="url(#avface)"/>
  <!-- Head -->
  <ellipse cx="60" cy="48" rx="22" ry="24" fill="url(#avface)"/>
  <!-- Hair -->
  <path d="M38 42 Q38 22 60 18 Q82 22 82 42 Q82 34 72 30 Q62 26 52 30 Q42 34 38 42" fill="url(#avhair)"/>
  <!-- Side hair -->
  <path d="M38 42 Q36 48 38 54" fill="url(#avhair)" opacity="0.6"/>
  <path d="M82 42 Q84 48 82 54" fill="url(#avhair)" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M48 40 Q52 38 56 40" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64 40 Q68 38 72 40" fill="none" stroke="#2c3e50" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="46" rx="4" ry="4.5" fill="#fff"/>
  <ellipse cx="68" cy="46" rx="4" ry="4.5" fill="#fff"/>
  <circle cx="52" cy="46.5" r="2.5" fill="#1a2840"/>
  <circle cx="68" cy="46.5" r="2.5" fill="#1a2840"/>
  <circle cx="53" cy="45.5" r="1" fill="#fff" opacity="0.85"/>
  <circle cx="69" cy="45.5" r="1" fill="#fff" opacity="0.85"/>
  <!-- Nose -->
  <path d="M58 52 Q60 55 62 52" fill="none" stroke="#c9a882" stroke-width="1" stroke-linecap="round"/>
  <!-- Mouth (friendly smile) -->
  <path d="M53 59 Q60 64 67 59" fill="none" stroke="#c4785a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="38" cy="48" rx="3" ry="5" fill="url(#avface)"/>
  <ellipse cx="82" cy="48" rx="3" ry="5" fill="url(#avface)"/>
</svg>
