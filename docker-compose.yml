services:
  backend:
    image: anti-fraud-backend:1.0
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      # Database (override)
      ANTI_FRAUD_DB_PATH: /app/data/anti_fraud.db
    volumes:
      - anti_fraud_data:/app/data
      - anti_fraud_logs:/app/logs
    restart: unless-stopped

  frontend:
    image: anti-fraud-frontend:1.0
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

volumes:
  anti_fraud_data:
  anti_fraud_logs:
